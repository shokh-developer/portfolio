<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.3.0/css/all.min.css">
    <link rel="stylesheet" href="contact.css">
    <title>Contact | SHOKH</title>
</head>
<body>
    <header class="contact-header">
        <nav class="nav-links">
            <a class="nav-logo" href="index.html">
                <h1>SHOKH</h1>
            </a>

            <div class="nav-mobile">
                <a class="menu-toggle" href="#primary-navigation">
                    <span class="menu-toggle__bar"></span>
                    <span class="menu-toggle__bar"></span>
                    <span class="menu-toogle__bar"></span>
                </a>

                <div class="nav-link" id="primary-navigation">
                   <ul>
                     <li>
                        <a href="index.html#home">home</a>
                     </li>
                     <li>
                        <a href="index.html#About">About</a>
                     </li>
                     <li>
                        <a href="index.html#education">Education</a>
                     </li>
                     <li>
                        <a href="index.html#Hobby">Hobby</a>
                     </li>
                     <li>
                        <a href="index.html#portfolio">Portfolio</a>
                     </li>
                   </ul>
                </div> 
                
                <a class="nav-overlay" href="#"></a>
            </div>

            <form action="index.html">
                <button type="submit">Home</button>
            </form>
        </nav>
    </header>

    <main>
        <section id="contact">
            <form class="contact-form" action="#" method="post">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="Your name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label for="subject">Subject</label>
                    <input type="subject" id="subject" name="subject" placeholder="What is it about?" required>
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" placeholder="Write your message here...." required></textarea>
                </div>

                <button type="submit">Send message</button>
            </form>
        </section>
    </main>
</body>
</html>
